# COMPASS — S. aureus MRSA/VRSA AMR Panel
# Targets: mecA/mecC (MRSA), vanA (VRSA), blaZ (penicillinase),
#          FQ resistance (gyrA/grlA), rifampicin (rpoB), MLSb (erm genes).
# Reference: S. aureus NCTC 8325 (NC_007795.1)
# Note: S. aureus has low GC (32.8%) — MFE threshold relaxed, GC window widened down.

name: saureus_mrsa_panel
output_dir: results/saureus_mrsa
organism: saureus

reference:
  genome_fasta: data/references/saureus_NCTC8325.fasta
  genome_index: data/references/saureus_NCTC8325
  human_index: null
  gff_annotation: data/references/saureus_NCTC8325.gff3
  genbank_annotation: null

candidates:
  spacer_lengths: [18, 19, 20, 21, 22, 23]
  use_enascas12a: true
  cas_variant: enAsCas12a
  require_seed_mutation: true
  gc_min: 0.20
  gc_max: 0.55
  homopolymer_max: 5
  mfe_threshold: -2.0

synthetic_mismatch:
  enabled: true
  cas_variant: enAsCas12a
  min_activity_vs_mut: 0.25
  min_discrimination_improvement: 1.5
  max_synthetic_mismatches: 2
  allow_double_sm: true

scoring:
  use_heuristic: true
  use_ml: false
  use_discrimination: true
  ml_model_name: heuristic
  discrimination_min_ratio: 2.0
  discrimination_method: heuristic

multiplex:
  max_plex: 15
  optimizer: simulated_annealing
  max_iterations: 10000
  cross_reactivity_threshold: 0.3
  efficiency_weight: 0.4
  discrimination_weight: 0.3
  cross_reactivity_weight: 0.3
  include_species_control: true

primers:
  primer_length_min: 25
  primer_length_max: 38
  tm_min: 55.0
  tm_max: 65.0
  amplicon_min: 80
  amplicon_max: 150
  enable_allele_specific: true
  as_rpa_deliberate_mm_pos: [-2, -3]
  max_pairs_per_candidate: 10
